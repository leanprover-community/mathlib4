name: Post PR summary comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Limit permissions for GITHUB_TOKEN for the entire workflow
permissions:
  contents: read
  pull-requests: write  # Only allow PR comments/labels
  # All other permissions are implicitly 'none'

jobs:
  build:
    name: "post-or-update-summary-comment"
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'leanprover-community/mathlib4' &&
      github.event.action != 'labeled' &&
      github.event.action != 'unlabeled'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
        path: pr-branch

    - name: Checkout local actions
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.workflow_sha }}
        fetch-depth: 1
        sparse-checkout: .github/actions
        path: workflow-actions
    - name: Get mathlib-ci
      uses: ./workflow-actions/.github/actions/get-mathlib-ci

    - name: Update the merge-conflict label
      run: |
        cd pr-branch
        printf 'PR number: "%s"\n' "${{ github.event.pull_request.number }}"
        git config user.name "leanprover-community-mathlib4-bot"
        git config user.email "leanprover-community-mathlib4-bot@users.noreply.github.com"

        if git merge origin/master --no-ff --no-commit
        then
          git merge --abort || true
          echo "This PR does not have merge conflicts with master."
          # we use curl rather than octokit/request-action so that the job won't fail
          # (and send an annoying email) if the labels don't exist
          curl --request DELETE \
            --url https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/merge-conflict \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}'
        else
          echo "This PR has merge conflicts with master."
          # we use curl rather than octokit/request-action so that the job won't fail
          # (and send an annoying email) if the labels don't exist
          curl --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --url https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
            --data '{"labels":["merge-conflict"]}'
        fi

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        sudo apt-get install -y jq
        # If you have additional dependencies, install them here

    - name: Get changed and removed/renamed files
      run: |
        cd pr-branch
        git fetch origin ${{ github.base_ref }}  # fetch the base branch

        # Get the list of all changed files.
        echo "Saving the changed files to 'changed_files.txt'..."
        git diff --name-only origin/${{ github.base_ref }}... | tee changed_files.txt

        # Get all newly added files.
        echo "Checking for added files..."
        git diff --name-only --diff-filter A origin/${{ github.base_ref }}... | tee added_files.txt

        # Get all files which were removed or renamed.
        echo "Checking for removed files..."

        # Shows the `D`eleted files, one per line.
        git diff --name-only --diff-filter D origin/${{ github.base_ref }}... | tee removed_files.txt
        echo "Checking for renamed files..."

        # Shows the `R`enamed files, in human-readable format
        # The `awk` pipe
        # * extracts into an array the old name as the key and the new name as the value
        # * eventually prints "`oldName` was renamed to `newName`" for each key-value pair.
        git diff -p --summary --diff-filter=R origin/${{ github.base_ref }}... |
          awk '
            /^rename from / {
                file=$0
                gsub(/rename from /, "", file)
                oldFile=file
              }
            /^rename to / {
                file=$0
                gsub(/rename to /, "", file)
                oldNew[oldFile]=file
              } END {
                for(old in oldNew) {
                  printf("`%s` was renamed to `%s`\n", old, oldNew[old])
                }
              }' | tee renamed_files.txt

    - name: Compute (re)moved files without deprecation
      run: |
        cd pr-branch
        touch moved_without_deprecation.txt
        touch extraneous_deprecated_module.txt
        git checkout ${{ github.base_ref }}
        while IFS= read -r file
        do
          if grep ^deprecated_module "${file}" ; then
            # shellcheck disable=SC2016
            printf '\n⚠️ **warning**: removed file `%s` contains a module deprecation: please add this in a follow-up PR instead\n' "${file}" |
              tee -a extraneous_deprecated_module.txt
          else
            # shellcheck disable=SC2016
            printf '\nnote: file `%s` was removed.\nPlease create a follow-up pull request adding a module deprecation. Thanks!\n' "${file}" |
              tee -a moved_without_deprecation.txt
          fi
        done < removed_files.txt
        IFS=$'\n'
        while IFS= read -r file
        do
          if grep ^deprecated_module "${file}" ; then
            # shellcheck disable=SC2016
            printf '\n⚠️ **warning**: renamed file `%s` contains a module deprecation: please add this in a follow-up PR instead\n' "${file}" |
              tee -a extraneous_deprecated_module.txt
          else
            # shellcheck disable=SC2016
            printf '\nnote: file `%s` without a module deprecation\nPlease create a follow-up pull request adding one. Thanks!\n' "${file}" |
              tee -a moved_without_deprecation.txt
          fi
        done < renamed_files.txt

        # we return to the PR branch, since the next step wants it!
        git checkout -

    - name: Compute transitive imports
      run: |
        cd pr-branch
        # the checkout dance, to avoid a detached head
        git checkout master
        git checkout -
        currentHash="$(git rev-parse HEAD)"
        printf 'currentHash=%s\n' "${currentHash}"

        echo "Compute the counts for the HEAD of the PR"
        python "${CI_SCRIPTS_DIR}/pr_summary/count-trans-deps.py" "Mathlib/" > head.json

        # Checkout the merge base
        git checkout "$(git merge-base master ${{ github.event.pull_request.head.sha }})"

        echo "Compute the counts for the merge base"
        python "${CI_SCRIPTS_DIR}/pr_summary/count-trans-deps.py" "Mathlib/" > base.json

        # switch back to the current branch: the `declarations_diff` script should be here
        git checkout "${currentHash}" --

    - name: Post or update the summary comment
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH_NAME: ${{ github.head_ref }}
      run: |
        cd pr-branch
        currentHash="$(git rev-parse HEAD)"
        PR="${{ github.event.pull_request.number }}"
        title="### PR summary"

        graphAndHighPercentReports=$(python "${CI_SCRIPTS_DIR}/pr_summary/import-graph-report.py" base.json head.json changed_files.txt)

        echo "Produce import count comment"
        importCount=$(
          printf '%s\n' "${graphAndHighPercentReports}" | sed '/^Import changes exceeding/Q'
          "${CI_SCRIPTS_DIR}/pr_summary/import_trans_difference.sh"
        )

        echo "Produce high percentage imports"
        high_percentages=$(
          printf '%s\n' "${graphAndHighPercentReports}" | sed -n '/^Import changes exceeding/,$p'
        )
        # if there are files with large increase in transitive imports, then we add the `large-import` label
        if [ -n "${high_percentages}" ]
        then
          high_percentages=$'\n\n'"${high_percentages}"
          gh pr edit "${PR}" --add-label large-import
        else # otherwise, we remove the label
          gh pr edit "${PR}" --remove-label large-import
        fi

        if [ "$(printf '%s' "${importCount}" | wc -l)" -gt 12 ]
        then
          importCount="$(printf '<details><summary>\n\n%s\n\n</summary>\n\n%s\n\n</details>\n' "#### Import changes for modified files" "${importCount}")"
        else
          importCount="$(printf '#### Import changes for modified files\n\n%s\n' "${importCount}")"
        fi

        echo "Compute Declarations' diff comment"
        declDiff=$("${CI_SCRIPTS_DIR}/pr_summary/declarations_diff.sh")
        if [ "$(printf '%s' "${declDiff}" | wc -l)" -gt 15 ]
        then
          declDiff="$(printf '<details><summary>\n\n%s\n\n</summary>\n\n%s\n\n</details>\n' "#### Declarations diff" "${declDiff}")"
        else
          declDiff="$(printf '#### Declarations diff\n\n%s\n' "${declDiff}")"
        fi
        git checkout "${currentHash}" --
        hashURL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/commits/${currentHash}"
        printf 'hashURL: %s' "${hashURL}"

        echo "Compute technical debt changes"
        techDebtVar="$("${CI_SCRIPTS_DIR}/reporting/technical-debt-metrics.sh" pr_summary)"

        # If technical debt did NOT increase, remove the label; otherwise add it.
        # We test for the *safe* patterns rather than the *unsafe* one so that if
        # mathlib-ci changes the script's output wording we fail closed (label added)
        # rather than open (label silently not added).
        if printf '%s' "${techDebtVar}" | grep -qE 'Decrease in tech debt:|No changes to technical debt\.'; then
          gh pr edit "${PR}" --remove-label increases-technical-debt
        else
          gh pr edit "${PR}" --add-label increases-technical-debt
        fi

        echo "Compute documentation reminder"
        workflowFilesChanged="$(grep '^\.github/workflows/' changed_files.txt || true)"
        if [ -n "${workflowFilesChanged}" ]
        then
          # Format each changed workflow path as a Markdown bullet: "- `path`"
          workflowFilesChangedMarkdown="$(sed "s|^|- \`|; s|\$|\`|" <<< "${workflowFilesChanged}")"
          workflowDocsReminder="$(printf "### ⚠️ Workflow documentation reminder\nThis PR modifies files under \`.github/workflows/\`.\nPlease update \`docs/workflows.md\` if the workflow inventory, triggers, or behavior changed.\n\nModified workflow files:\n%s\n" "${workflowFilesChangedMarkdown}")"
        else
          workflowDocsReminder=""
        fi

        echo "Compute scripts-location reminder"
        scriptsFilesAdded="$(grep '^scripts/' added_files.txt || true)"
        if [ -n "${scriptsFilesAdded}" ]
        then
          # Format each added scripts path as a Markdown bullet: "- `path`"
          scriptsFilesAddedMarkdown="$(sed "s|^|- \`|; s|\$|\`|" <<< "${scriptsFilesAdded}")"
          scriptsLocationReminder="$(printf "### ⚠️ Scripts folder reminder\nThis PR adds files under \`scripts/\`.\nPlease consider whether each added script belongs in this repository or in [\`leanprover-community/mathlib-ci\`](https://github.com/leanprover-community/mathlib-ci).\n\nA script belongs in **\`mathlib-ci\`** if it is a CI automation script that interacts with GitHub (e.g. managing labels, posting comments, triggering bots), runs from a trusted external checkout in CI, or requires access to secrets.\n\nA script belongs in **this repository** (\`scripts/\`) if it is a developer or maintainer tool to be run locally, a code maintenance or analysis utility, a style linting tool, or a data file used by the library's own linters.\n\nSee the [\`mathlib-ci\` README](https://github.com/leanprover-community/mathlib-ci) for more details.\n\nAdded scripts files:\n%s\n" "${scriptsFilesAddedMarkdown}")"
        else
          scriptsLocationReminder=""
        fi

        # store in a file, to avoid "long arguments" error.
        printf '%s [%s](%s)%s\n\n%s\n\n---\n\n%s\n\n---\n\n%s\n' "${title}" "$(git rev-parse --short HEAD)" "${hashURL}" "${high_percentages}" "${importCount}" "${declDiff}" "${techDebtVar}" > please_merge_master.md
        if [ -n "${workflowDocsReminder}" ]
        then
          printf '\n\n---\n\n%s\n' "${workflowDocsReminder}" >> please_merge_master.md
        fi
        if [ -n "${scriptsLocationReminder}" ]
        then
          printf '\n\n---\n\n%s\n' "${scriptsLocationReminder}" >> please_merge_master.md
        fi

        echo "Include any errors about removed or renamed files without deprecation,"
        echo "as well as errors about extraneous deprecated_module additions."
        if [ -s moved_without_deprecation.txt ]
        then
          printf '\n\n---\n\n' >> please_merge_master.md
          cat moved_without_deprecation.txt >> please_merge_master.md
        fi
        if [ -s extraneous_deprecated_module.txt ]
        then
          printf '\n\n---\n\n' >> please_merge_master.md
          cat extraneous_deprecated_module.txt >> please_merge_master.md
        fi

        cat please_merge_master.md
        "${CI_SCRIPTS_DIR}/pr_summary/update_PR_comment.sh" please_merge_master.md "${title}" "${PR}"

    - name: Update the file-removed label
      run: |
        cd pr-branch
        undeprecatedMoves="$(cat moved_without_deprecation.txt)"
        if [ -n "$undeprecatedMoves" ]; then
          echo "This PR has undeprecated module (re)movals."
          # we use curl rather than octokit/request-action so that the job won't fail
          # (and send an annoying email) if the labels don't exist
          curl --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --url https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
            --data '{"labels":["file-removed"]}'
        else
          echo "This PR (re)moves no modules without deprecations."
          # we use curl rather than octokit/request-action so that the job won't fail
          # (and send an annoying email) if the labels don't exist
          curl --request DELETE \
            --url https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/file-removed \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}'
        fi

  # This job gates merging via the `blocked-by-increases-technical-debt` label
  # in bors.toml.
  #
  # Why a separate label?  Bors's block_labels has no conditional logic, so we
  # need a derived label to express "increases-technical-debt AND NOT
  # allow-increases-technical-debt".  See the analogous comment on
  # check-large-import (in a companion PR) for the full rationale.
  #
  # Three labels, each managed by exactly one actor:
  #   - `increases-technical-debt`            — managed by the `build` job
  #   - `blocked-by-increases-technical-debt`  — managed by this job
  #   - `allow-increases-technical-debt`       — managed by the reviewer
  check-technical-debt:
    name: "Check technical debt"
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.repository == 'leanprover-community/mathlib4'

    steps:
    - name: Check for increases-technical-debt label
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        labels=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')

        has_increases=false
        has_allow=false

        if printf '%s\n' "$labels" | grep -qx "increases-technical-debt"; then
          has_increases=true
        fi

        if printf '%s\n' "$labels" | grep -qx "allow-increases-technical-debt"; then
          has_allow=true
        fi

        if [ "$has_increases" = true ] && [ "$has_allow" = false ]; then
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label blocked-by-increases-technical-debt
          echo "::error::This PR increases technical debt. Add the 'allow-increases-technical-debt' label after review to unblock."
          echo ""
          echo "This PR has the 'increases-technical-debt' label, indicating that it"
          echo "increases one or more technical debt metrics."
          echo ""
          echo "To unblock this PR, a reviewer should:"
          echo "  1. Check the PR summary comment for the technical debt changes."
          echo "  2. Consider whether the increase can be avoided."
          echo "  3. If the increase is acceptable, add the 'allow-increases-technical-debt' label."
          echo ""
          echo "Note: not all technical debt increases are avoidable. If you believe this"
          echo "check is too aggressive, please report it on the mathlib4 Zulip channel:"
          echo "https://leanprover.zulipchat.com/#narrow/channel/287929-mathlib4/topic/increases-technical-debt.20label"
          exit 1
        else
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label blocked-by-increases-technical-debt
        fi

        echo "Technical debt check passed."
