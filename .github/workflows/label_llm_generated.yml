name: Label PRs generated by Claude Code

on:
  pull_request_target:
    types:
      - opened

# Limit permissions for GITHUB_TOKEN for the entire workflow
permissions:
  contents: read
  pull-requests: write  # Only allow PR comments/labels
  # All other permissions are implicitly 'none'

jobs:
  label-llm-generated:
    runs-on: ubuntu-latest
    # Don't run on forks, where we wouldn't have permissions to add the label anyway.
    if: github.repository == 'leanprover-community/mathlib4'
    steps:
      - name: Add LLM-generated label for Claude Code PRs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Claude Code's default pull request attribution,
            // see https://code.claude.com/docs/en/settings#attribution-settings
            const footer = '🤖 Generated with [Claude Code](https://claude.com/claude-code)';
            const body = (context.payload.pull_request.body || '')
              .replace(/\r\n/g, '\n')
              .replace(/\s+$/u, '');

            if (!body.endsWith(footer)) {
              console.log('PR body does not end with the Claude Code footer.');
              return;
            }

            const { owner, repo } = context.repo;
            console.log('Adding "LLM-generated" label...');
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner,
              repo,
              labels: ['LLM-generated']
            });
