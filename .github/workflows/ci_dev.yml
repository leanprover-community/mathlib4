# TEMPORARY (branch ci-dev/zulip-emoji-reconcile): the usual contents of this
# file are replaced with the Zulip emoji reconciliation sweep from
# .github/workflows/zulip_emoji_reconcile.yml so it can be triggered with
# workflow_dispatch before that workflow exists on master (ci_dev.yml is
# dispatchable because it lives on master). Do not merge; restore from master
# when testing is done.
#
# Differences from the real workflow: no schedule trigger, dry-run defaults to
# TRUE (flip it off explicitly for a live run), and the job keeps ci_dev's
# guard restricting runs to ci-dev/* branches of the main repo.
name: ci dev

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Log planned reaction changes without modifying Zulip
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

jobs:
  reconcile:
    if: ${{ github.repository == 'leanprover-community/mathlib4' && github.ref_type == 'branch' && startsWith(github.ref_name, 'ci-dev/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out reconcile config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/zulip-emoji-config.json
          sparse-checkout-cone-mode: false

      - name: Reconcile
        # Temporarily pinned to the head of leanprover-community/mathlib-ci#61
        # (GraphQL resource-limits fix); repoint to master once that merges.
        uses: leanprover-community/mathlib-ci/.github/actions/zulip-emoji-reconcile@3020d4220281ddafdb0405a5d1df7a9f46b16d99
        with:
          config: .github/zulip-emoji-config.json
          sweep: true
          dry-run: ${{ inputs.dry-run }}
          zulip-api-key: ${{ secrets.ZULIP_API_KEY }}
          github-token: ${{ github.token }}
