name: ci dev

# Manual trigger that exercises the full `!downstream-check` dispatch
# flow end-to-end against a feature branch of `mathlib-ci`:
#
#   parse → validate-action (composite) → mint App token →
#   dispatch downstream-reports → ack-action (composite)
#
# This is a test shim for `pr_check_downstream.yml`. Differences from the
# real workflow:
#
#   * workflow_dispatch only (no `issue_comment` trigger)
#   * no author-association gate (workflow_dispatch implies actions:write)
#   * accepts a `mathlib_ci_ref` input — the composite actions are loaded
#     from `./mathlib-ci/.github/actions/check-downstream-*` after checking
#     out the named mathlib-ci ref, so this can test feature branches
#     before they merge to mathlib-ci's master.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "mathlib4 PR number to test against."
        required: true
        type: string
      downstreams:
        description: >-
          Comma-separated `<name-or-slug>[@<rev>] [--merge-branch]`
          entries.  Pass a deliberately malformed value (e.g. `FLT --bogus`)
          to exercise the grammar-error comment path.
        required: true
        type: string
      mathlib_ci_ref:
        description: "mathlib-ci ref (branch/tag/SHA) carrying the check-downstream actions to test."
        required: false
        type: string
        default: marcelo/2026/05/DownstreamPrValidation
      downstream_reports_ref:
        description: >-
          downstream-reports ref to dispatch `mathlib-pr-validation.yml`
          on.  Defaults to the open feature branch so the dispatch picks
          up the matching workflow shape (e.g. the `triggered_by` input
          that's not yet on master).
        required: false
        type: string
        default: PullRequestOnDemandValidation
      post_results:
        description: "Forward `post_results` to the dispatched downstream-reports workflow."
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write   # required to POST comments on PRs
  issues: write          # PR comments use the issues API
  id-token: write        # Azure Key Vault token mint

concurrency:
  group: ci-dev-check-downstream-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  trigger:
    # Only allow from `ci-dev/*` branches on the upstream repo, mirroring
    # the existing ci-dev convention.  Pushing a `ci-dev/<user>/<topic>`
    # branch to `leanprover-community/mathlib4` is how feature work gets
    # exercised against real PRs before its workflow lands on master.
    if: ${{ github.repository == 'leanprover-community/mathlib4' && startsWith(github.ref_name, 'ci-dev/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out mathlib-ci @ ${{ inputs.mathlib_ci_ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: leanprover-community/mathlib-ci
          ref: ${{ inputs.mathlib_ci_ref }}
          path: mathlib-ci

      - name: Validate downstream entries
        id: validate
        # Local-path reference into the just-checked-out mathlib-ci.
        # This is how the test shim picks up a feature branch's actions
        # without pinning to a tagged ref.
        uses: ./mathlib-ci/.github/actions/check-downstream-validate
        with:
          names: ${{ inputs.downstreams }}
          pr-number: ${{ inputs.pr_number }}
          repo: ${{ github.repository }}
          commenter: ${{ github.actor }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mint App token (for downstream-reports)
        id: app_token
        uses: leanprover-community/mathlib-ci/.github/actions/azure-create-github-app-token@3bb576208589a435eeaeac9b144a1b7c3e948760
        with:
          app-id: ${{ secrets.DOWNSTREAM_REPORTS_AUTOMATION_APP_ID }}
          key-vault-name: ${{ vars.MATHLIB_AZ_KEY_VAULT_NAME }}
          key-name: downstream-reports-automation-app-pk
          azure-client-id: ${{ vars.GH_APP_AZURE_CLIENT_ID_DOWNSTREAM_REPORTS_AUTOMATION }}
          azure-tenant-id: ${{ secrets.LPC_AZ_TENANT_ID }}
          owner: leanprover-community
          repositories: downstream-reports

      - name: Dispatch downstream-reports workflow
        env:
          GH_TOKEN:     ${{ steps.app_token.outputs.token }}
          PR_NUMBER:    ${{ inputs.pr_number }}
          MERGE_SHA:    ${{ steps.validate.outputs.merge_sha }}
          DOWNSTREAMS:  ${{ steps.validate.outputs.resolved_names }}
          POST_RESULTS: ${{ inputs.post_results }}
          TRIGGERED_BY: ${{ github.actor }}
          REPORTS_REF:  ${{ inputs.downstream_reports_ref }}
        run: |
          gh workflow run mathlib-pr-validation.yml \
            -R leanprover-community/downstream-reports \
            --ref "$REPORTS_REF" \
            -f pr_number="$PR_NUMBER" \
            -f merge_sha="$MERGE_SHA" \
            -f downstreams="$DOWNSTREAMS" \
            -f post_results="$POST_RESULTS" \
            -f triggered_by="$TRIGGERED_BY"

      - name: Post ack comment
        uses: ./mathlib-ci/.github/actions/check-downstream-ack
        with:
          repo: ${{ github.repository }}
          pr-number: ${{ inputs.pr_number }}
          downstreams: ${{ steps.validate.outputs.resolved_names }}
          merge-sha: ${{ steps.validate.outputs.merge_sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
