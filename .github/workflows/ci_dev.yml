name: ci dev

on:
  workflow_dispatch:
    inputs:
      tools_branch_ref:
        description: ref for tools checkout (defaults to 'this commit')
        required: false
        type: string
        default: ''
      pr_branch_ref:
        description: ref for building-branch checkout (defaults to 'this commit')
        required: false
        type: string
        default: ''
      run_post_ci:
        description: Run the post-CI job?
        required: false
        type: boolean
        default: false # We shouldn't need this job in typical experiments
      mathlib_ci_ref:
        description: ref for mathlib-ci checkout (defaults to 'master')
        required: false
        type: string
        default: 'master'
      decls_diff_pr_number:
        description: 'PR number to replay the decls-diff against. Leave empty to skip the post-build job.'
        required: false
        type: string
        default: ''
      decls_diff_master_run_id:
        description: 'Master-side Build run ID to use as the reference artifact (bypasses auto-lookup).'
        required: false
        type: string
        default: ''
      decls_diff_patch_comment:
        description: '`true` to also PATCH the PR-summary comment. Only relevant when `decls_diff_pr_number` is set.'
        required: false
        type: boolean
        default: false

# Limit permissions for GITHUB_TOKEN for the entire workflow
permissions:
  contents: read
  id-token: write
  # By default let's remove this permission (which is present in the other build pipelines)
  # from the CI experimentation runs to avoid unwitting side effects
  # pull-requests: write

jobs:
  build:
    name: ci (dev branch)
    # For sanity and intentionality, let's only trigger this from branches ci-dev/*
    if: ${{ github.repository == 'leanprover-community/mathlib4' && github.ref_type == 'branch' && startsWith(github.ref_name, 'ci-dev/') }}
    uses: ./.github/workflows/build_template.yml
    with:
      concurrency_group: ${{ github.workflow }}-${{ github.ref }}
      # Use the tools from 'this branch', as our changes in the tools might be relevant for experiments
      tools_branch_ref: ${{ inputs.tools_branch_ref != '' && inputs.tools_branch_ref || github.sha }}
      pr_branch_ref: ${{ inputs.pr_branch_ref != '' && inputs.pr_branch_ref || github.sha }}
      run_post_ci: ${{ inputs.run_post_ci }}
      mathlib_ci_ref: ${{ inputs.mathlib_ci_ref }}
      cache_application_id: ${{ vars.CACHE_NON_MASTER_WRITER_AZURE_APP_ID }}
      runs_on: pr
    secrets: inherit

  # Test the post-build decls-diff workflow as a chained reusable workflow.
  # Until decls-diff.yml lands on master, workflow_dispatch can't register its
  # button on the UI — so we chain it here instead.
  decls_diff:
    name: decls-diff (dev branch)
    needs: build
    if: needs.build.result == 'success'
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: ./.github/workflows/decls-diff.yml
    with:
      run_id: ${{ github.run_id }}
      pr_number: ${{ inputs.decls_diff_pr_number }}
      master_run_id: ${{ inputs.decls_diff_master_run_id }}
      patch_comment: ${{ inputs.decls_diff_patch_comment }}
    secrets: inherit
