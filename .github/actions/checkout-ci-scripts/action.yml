name: Checkout CI Scripts
description: Checkout CI scripts from a dedicated repository/ref.

inputs:
  ref:
    description: Ref in the scripts repository.
    required: false
    default: main
  sparse_checkout:
    description: Newline-separated sparse checkout patterns.
    required: false
    default: ""
  path:
    description: Destination path for the checkout.
    required: false
    default: ci-tools
  checkout_path_env_var:
    description: Environment variable name to export the checkout path.
    required: false
    default: CI_CHECKOUT_PATH
  scripts_dir_env_var:
    description: Environment variable name to export the scripts directory path.
    required: false
    default: CI_SCRIPTS_DIR

outputs:
  checkout_path:
    description: Absolute checkout path.
    value: ${{ steps.paths.outputs.checkout_path }}
  scripts_dir:
    description: Absolute path to the scripts directory.
    value: ${{ steps.paths.outputs.scripts_dir }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: leanprover-community/mathlib-ci
        ref: ${{ inputs.ref }}
        fetch-depth: 1
        sparse-checkout: ${{ inputs.sparse_checkout }}
        path: ${{ inputs.path }}
    - id: paths
      shell: bash
      run: |
        checkout_path="${GITHUB_WORKSPACE}/${{ inputs.path }}"
        scripts_dir="${checkout_path}/scripts"
        echo "checkout_path=${checkout_path}" >> "$GITHUB_OUTPUT"
        echo "scripts_dir=${scripts_dir}" >> "$GITHUB_OUTPUT"
        echo "${{ inputs.checkout_path_env_var }}=${checkout_path}" >> "$GITHUB_ENV"
        echo "${{ inputs.scripts_dir_env_var }}=${scripts_dir}" >> "$GITHUB_ENV"
